name: Deploy to GitHub Pages

# Publish the site on every merge to master, and on demand from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

# The deploy job needs to mint an id-token and write the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deploy at a time; let an in-flight publish finish rather than
# cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Turns Pages on (source = GitHub Actions) the first time this runs, so no
      # manual Settings step is required.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # GitHub Pages serves 404.html for any path that isn't a real file. This
      # app is a client-routed SPA, so serving the app shell there lets deep
      # links (e.g. /my-portfolio/project/3 on refresh) boot and route instead
      # of hitting a hard 404.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
